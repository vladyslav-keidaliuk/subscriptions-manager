# Simple Docker setup without seeding during build
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: subscriptions_minimal
      POSTGRES_USER: subscriptions_user
      POSTGRES_PASSWORD: minimal_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptions_user -d subscriptions_minimal"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://subscriptions_user:minimal_password@postgres:5432/subscriptions_minimal
      - SESSION_SECRET=simple-dev-secret
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma db push &&
        node prisma/seed.cjs &&
        npm start
      "

volumes:
  postgres_data: