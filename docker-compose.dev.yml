services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: subscriptions_dev
      POSTGRES_USER: subscriptions_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptions_user -d subscriptions_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://subscriptions_user:dev_password@postgres:5432/subscriptions_dev
      - SESSION_SECRET=dev-secret-key
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: